casual:
  ##############################################################################
  upper:
  ##############################################################################
    - __fash/outerwear/casual/camisole__
    - __fash/outerwear/casual/cardigan__
    - __fash/outerwear/casual/hoodie__
    - __fash/outerwear/casual/shirt__
    - __fash/outerwear/casual/sweater__
    - __fash/outerwear/casual/sweatshirt__
    - __fash/outerwear/casual/t-shirt__
    - __fash/outerwear/casual/top__
    - __fash/outerwear/casual/tunic__

  upper-types:
    - blouse
    - camisole
    - cardigan
    - hoodie
    - jumpsuit
    - playsuit
    - romper
    - shirt
    - shrug
    - sweater
    - sweatshirt
    - t-shirt
    - top
    - tunic
    - vest

  # Casual shirt, typically short-sleeved and made of cotton.
  # Originally an undershirt, they were popularized as outerwear
  # by Hollywood in the 50s.
  t-shirt:
    - __fash/styles/t-shirt/style__ t-shirt
    - __fash/styles/t-shirt/fit__ t-shirt
    # TODO - __fash/styles/t-shirt/trim__-trim t-shirt
    - __fash/styles/t-shirt/length__ t-shirt
    - __fash/styles/t-shirt/neckline__ t-shirt
    - __fash/styles/t-shirt/deco__ t-shirt
    - t-shirt with __fash/styles/t-shirt/sleeve__ sleeves


  # TODO placeholder name, move
  top-blouse-tunic:
    - __fash/styles/upper/length__
    - __fash/styles/upper/top-blouse-tunic__
    - __fash/styles/upper/top-blouse-tunic-hem__-hem
    - __fash/styles/upper/top-blouse-tunic-closure__

  # Generic womens' top. Overlaps somewhat with t-shirts and camisoles.
  top:
    - __fash/styles/upper/casual__ top
    - __fash/styles/upper/top-dress-legged__ top

    # TODO
    - __fash/styles/top/casual__ top

    - __fash/outerwear/casual/top-blouse-tunic__ top
    - __fash/outerwear/casual/sleeved-top__
    - __fash/outerwear/casual/sleeveless-top__
    - __fash/outerwear/casual/sports-top__

  # Either strapless or with straps.
  sleeved-top:
    - __fash/styles/top/sleeved__ top with __fash/styles/upper/sleeve/casual/*__ sleeves

  # Either strapless or with straps.
  sleeveless-top:
    - __fash/outerwear/casual/strapless-top__
    - sleeveless __fash/styles/upper/neckline/sleeveless__ top
    - sleeveless __fash/styles/upper/top-blouse-tunic-hem__-hem top

  # Sleeveless.
  strapless-top:
    - strapless __fash/styles/neckline/000-tube-like/strapless__ top # TODO
    - __fash/outerwear/casual/bandeau-top__
    - __fash/outerwear/casual/tube-top__
    # TODO variants other than neckline! Should have everything that general tops do
    - strapless __fash/styles/upper/casual__ top
    - strapless __fash/styles/upper/top-dress-legged__ top # TODO not 100%

    - strapless __fash/outerwear/casual/top-blouse-tunic__ top

  sports-top:
    - __fash/styles/upper/neckline/sports__ sports top
    - __fash/styles/upper/neckline/sports-halter__ halter sports top

  # Tank top variants.
  tank-top:
    - __fash/styles/upper/length__ tank top
    - __fash/styles/upper/top-blouse-tunic-hem__-hem tank top
    - __fash/styles/upper/neckline/tank-top-like__ tank top

  # Bandeau top variants.
  bandeau-top:
    - bandeau top
    - __fash/styles/top/neckline/bandeau__ bandeau top
    #- __fash/styles/common/trim__-trim top
    # TODO variants other than neckline?
    # At least ruched etc

  # Halterneck top variants.
  halter-top:
    - __fash/styles/upper/neckline/halter__ top

    - __fash/styles/upper/casual__ halter top
    - __fash/styles/upper/top-dress-legged__ halter top # TODO not 100% match
    - __fash/outerwear/casual/top-blouse-tunic__ halter top

    # TODO off-shoulder
    #- off-shoulder halter top with __fash/styles/upper/sleeve/casual/*__ sleeves
    #- __fash/styles/neckline/101-off-shoulder-with-straps/halter__ halter top with off-shoulder sleeves

  # Tube top variants, almost synonymous with bandeau.
  tube-top:
    - tube top
    - __fash/styles/top/neckline/tube__ tube top

    # TODO test these
    - __fash/styles/upper/casual__ tube top
    - __fash/styles/upper/length__ tube top
    - __fash/styles/upper/top-blouse-tunic-hem__-hem tube top
    #- __fash/styles/common/trim__-trim top

  # Womens' sleeveless top, typically with spaghetti straps.
  # Originally only used as underwear.
  camisole:
    - __fash/styles/upper/casual__ camisole
    - __fash/styles/upper/length__ camisole
    - __fash/styles/upper/top-blouse-tunic-hem__-hem camisole

    - __fash/styles/camisole/neckline__ camisole
    - __fash/styles/camisole/style__ camisole

    #- __fash/styles/common/trim__-trim camisole
    # TODO additional variants?


  # Button-closure shirt, usually with a collar.
  shirt:
    - __fash/styles/upper/length__ shirt
    - __fash/styles/shirt/casual__ shirt
    - shirt with __fash/styles/shirt/sleeve/casual__ sleeves
    #- sleeveless __fash/styles/shirt/casual__ shirt

  # Loose-fitting shirt.
  blouse:
    - __fash/styles/upper/casual__ blouse
    - __fash/styles/upper/top-blouse-tunic__ blouse
    - __fash/styles/upper/top-blouse-tunic-closure__ blouse
    - __fash/styles/upper/top-blouse-tunic-hem__-hem blouse
    - __fash/styles/upper/length__ blouse
    - __fash/styles/blouse/neckline__ blouse
    - blouse with __fash/styles/upper/sleeve/casual/*__ sleeves
    #- __fash/styles/common/trim__-trim blouse

  # Casual, blouse-like but longer. Used with pants, not a dress.
  tunic:
    - __fash/styles/upper/casual__ tunic
    - __fash/styles/upper/top-blouse-tunic__ tunic
    - __fash/styles/upper/top-blouse-tunic-closure__ tunic
    - __fash/styles/upper/top-blouse-tunic-hem__-hem tunic
    - __fash/styles/blouse/neckline__ tunic
    - __fash/styles/skirt/length/short__ tunic
    - tunic with __fash/styles/upper/sleeve/casual/*__ sleeves
    #- __fash/styles/common/trim__-trim tunic

  # Knitted or crocheted shirt, usually long-sleeved, often woolen.
  sweater:
    - __fash/styles/upper/length__ __fash/styles/sweater/casual__ sweater
    - __fash/styles/sweater/neckline__ __fash/styles/sweater/casual__ sweater
    - __fash/styles/sweater/fit-length-hem__
        { __fash/styles/sweater/closure__
        | __fash/styles/sweater/neckline__
        | __fash/styles/sweater/knit__ } sweater
    - __fash/styles/sweater/fit-length-hem__ sweater with
        { __fash/styles/shirt/sleeve/casual__ sleeves
        | __fash/styles/sweater/pattern__ }
    - __fash/styles/sweater/neckline__ sweater with
        { __fash/styles/shirt/sleeve/casual__ sleeves
        | __fash/styles/sweater/pattern__ }

  sweater-vest:
    - __fash/styles/upper/length__ __fash/styles/sweater/casual__ sweater vest
    - __fash/styles/upper/neckline/vest-like__ __fash/styles/sweater/casual__ sweater vest

    - __fash/styles/sweater/fit-length-hem__
        { __fash/styles/upper/neckline/vest-like__
        | __fash/styles/sweater/closure__
        | __fash/styles/sweater/knit__ } sweater vest

    - __fash/styles/sweater/fit-length-hem__ sweater vest with __fash/styles/sweater/pattern__

  # Open-front sweater, usually button-closure.
  cardigan:
    - __fash/styles/sweater/fit-length-hem__
      { __fash/styles/sweater/cardigan/casual__
      | __fash/styles/sweater/knit__ } cardigan
    - __fash/styles/sweater/fit-length-hem__ cardigan with
      { __fash/styles/shirt/sleeve/casual__ sleeves
      | __fash/styles/sweater/pattern__ }

  sweatshirt:
    - __fash/styles/shirt/fit-length__ __fash/styles/shirt/neckline/sweatshirt__ sweatshirt
    - __fash/styles/shirt/fit-length__ __fash/styles/shirt/sweatshirt__ sweatshirt

  hoodie:
    - __fash/styles/shirt/fit-length__ __fash/styles/shirt/sweatshirt__ hoodie


  ##############################################################################
  lower:
  ##############################################################################
    - __fash/outerwear/casual/pants__
    - __fash/outerwear/casual/shorts__
    - __fash/outerwear/casual/skirt__

  pants:
    - >
      { __fash/styles/common/fit/casual__
      | __fash/styles/pants/leg/casual__
      | __fash/styles/pants/length__
      | __fash/styles/pants/waistline__ }
        __fash/styles/pants/casual__

    - __fash/outerwear/casual/loose-fit-pants__
    - __fash/outerwear/casual/slim-fit-pants__

    - __fash/outerwear/casual/jeans__

  loose-fit-pants:
    - __fash/styles/pants/leg/casual__ __fash/styles/pants/loose-fit__
    - __fash/styles/pants/length__ __fash/styles/pants/loose-fit__
    - __fash/styles/pants/waistline__ __fash/styles/pants/loose-fit__

  slim-fit-pants:
    - __fash/styles/pants/length__ __fash/styles/pants/slim-fit__
    - __fash/styles/pants/waistline__ __fash/styles/pants/slim-fit__

  jeans:
    - __fash/styles/common/denim/**__ __fash/styles/pants/jeans__ jeans
    - >
      { __fash/styles/common/denim/**__
      | __fash/styles/pants/length__
      | __fash/styles/pants/waistline__ }
        __fash/styles/common/fit/casual__ jeans
    - >
      { __fash/styles/common/denim/**__
      | __fash/styles/pants/leg/casual__
      | __fash/styles/pants/length__ }
        __fash/styles/pants/waistline__ jeans

  shorts:
    - __fash/styles/pants/shorts__

  skirt:
    - >
      { __fash/styles/skirt/length/casual__
      | __fash/styles/skirt/waist__-waist
      | __fash/styles/skirt/hem__-hemline }
        __fash/styles/skirt/casual__ skirt

  short-skirt:
    - __fash/styles/skirt/length/short__
      { __fash/styles/skirt/casual__
      | __fash/styles/skirt/waist__-waist
      | __fash/styles/skirt/hem__-hemline } skirt

  long-skirt:
    - __fash/styles/skirt/length/long__
      { __fash/styles/skirt/casual__
      | __fash/styles/skirt/waist__-waist
      | __fash/styles/skirt/hem__-hemline } skirt

  # TODO __fash/styles/skirt/material__

  denim-skirt:
    - __fash/styles/skirt/casual__ denim skirt
    - __fash/styles/common/denim/**__ denim skirt

  ##############################################################################
  one-piece:
  ##############################################################################
    - >
      {4::__fash/outerwear/casual/dress__
      |__fash/outerwear/casual/legged__}

  legged:
    - __fash/outerwear/casual/boilersuit__
    - __fash/outerwear/casual/jumpsuit__
    - __fash/outerwear/casual/playsuit__
    - __fash/outerwear/casual/romper__
    - __fash/outerwear/casual/overalls__

  boilersuit:
    - denim boilersuit
    - linen boilersuit

  jumpsuit:
    - __fash/styles/jumpsuit/lower__ __fash/styles/jumpsuit/casual__ jumpsuit
    - __fash/styles/jumpsuit/lower__ __fash/styles/upper/neckline/sleeveless__ jumpsuit
    - __fash/styles/upper/neckline/sleeved__ jumpsuit
        with __fash/styles/jumpsuit/sleeves__ sleeves

  playsuit:
    - __fash/styles/jumpsuit/waist__ __fash/styles/jumpsuit/casual__ playsuit
    - __fash/styles/jumpsuit/waist__ __fash/styles/upper/neckline/sleeveless__ playsuit
    - __fash/styles/upper/neckline/sleeved__ playsuit
        with __fash/styles/jumpsuit/sleeves__ sleeves

  romper:
    - __fash/styles/jumpsuit/waist__ __fash/styles/jumpsuit/casual__ romper
    - __fash/styles/jumpsuit/waist__ __fash/styles/upper/neckline/sleeveless__ romper
    - __fash/styles/upper/neckline/sleeved__ romper
        with __fash/styles/jumpsuit/sleeves__ sleeves

  # TODO Should possibly count as lower, as they typically need a top
  overalls:
    - __fash/styles/pants/leg/casual__ overalls
    - __fash/styles/pants/length__ overalls
    - '{cargo overalls|overalls shorts|overalls skort}'

  ##############################################################################
  dress:
    - __fash/styles/skirt/length/casual__ __fash/styles/dress/casual__ dress

    - __fash/styles/dress/lower/casual__ __fash/styles/dress/upper/casual__ dress
    - __fash/styles/dress/lower/casual__ __fash/styles/dress/waist/casual__-waist dress
    - __fash/styles/dress/waist/casual__-waist __fash/styles/dress/upper/casual__ dress

    - __fash/outerwear/casual/sleeved-dress__
    - __fash/outerwear/casual/sleeveless-dress__

    #- __fash/styles/common/trim__-trim dress
    #- __fash/styles/common/trim__-neckline dress

  sleeved-dress:
    - __fash/styles/dress/lower/casual__ __fash/styles/dress/sleeved/casual__
    - __fash/styles/dress/waist/casual__-waist __fash/styles/dress/sleeved/casual__

  sleeveless-dress:
    - __fash/styles/dress/lower/smart__ __fash/styles/dress/sleeveless/casual__
    - __fash/styles/dress/waist/casual__-waist __fash/styles/dress/sleeveless/casual__

  # off-shoulder-dress:

  # halter-dress:

  # tube-dress:

  denim-dress:
    - __fash/styles/skirt/length/short__ __fash/styles/dress/denim__ denim dress
    - __fash/styles/common/denim/wash__ __fash/styles/dress/denim__ denim dress # Not always reliable

  sundress:
    # No specified neckline/sleeves (usually gives thin straps, sleeveless)
    - __fash/styles/sundress/skirt__-skirted __fash/styles/sundress/bodice__ sundress # TODO

    # Sleeveless
    - __fash/styles/sundress/neckline/sleeveless__ __fash/styles/sundress/bodice__ sundress # TODO
    - __fash/styles/sundress/skirt__-skirted __fash/styles/sundress/neckline/sleeveless__ sundress # TODO

    # Sleeved
    # TODO should maybe have lower probability than 50%
    -  __fash/styles/sundress/bodice__ sundress with __fash/styles/sundress/sleeve__ sleeves
    # TODO consider only "low" necklines with sleeves
    -  __fash/styles/sundress/neckline/sleeved__ sundress with __fash/styles/sundress/sleeve__ sleeves
    - __fash/styles/sundress/skirt__-skirted sundress with __fash/styles/sundress/sleeve__ sleeves

  #
  # Skirted versions of upper-body clothing
  #

  # TODO is this really casual or outerwear? Maybe just loungewear
  babydoll-dress:
    - __fash/styles/skirt/length/short__ __fash/styles/camisole/neckline__ babydoll dress

  # TODO not sure if blouson should have its own entry
  #blouson-dress:
    #- __fash/styles/dress/skirt/casual__  blouson dress
    #- __fash/styles/blouse/TODO__ blouson dress
    #- __fash/styles/dress/skirt/casual__ blouson dress with __fash/styles/upper/sleeve/casual/*__ sleeves

  cami-dress:
    - __fash/styles/dress/skirt/casual__ __fash/outerwear/casual/camisole__ dress
  # cardigan-dress:
  # - __fash/styles/skirt/length/short__ __fash/styles/sweater/cardigan__ cardigan dress
  shirt-dress:
    - __fash/styles/dress/skirt/casual__ __fash/styles/shirt/casual__ shirt dress
    - __fash/styles/dress/skirt/casual__ shirt dress with __fash/styles/shirt/sleeve/casual__ sleeves
    - __fash/styles/dress/skirt/casual__ sleeveless __fash/styles/shirt/casual__ shirt dress
  sweater-dress:
    - __fash/styles/dress/skirt/casual__ __fash/outerwear/casual/sweater__ dress
  sweatshirt-dress:
    - __fash/styles/skirt/length/short__
      {__fash/outerwear/casual/sweatshirt__|__fash/outerwear/casual/hoodie__} dress
  t-shirt-dress:
    - __fash/styles/skirt/length/short__ __fash/styles/dress/t-shirt__
  tank-dress:
    - __fash/styles/skirt/length/short__ __fash/styles/upper/neckline/tank-top-like__ tank dress
  tunic-dress:
    - __fash/styles/dress/skirt/casual__ __fash/styles/ypper/neckline/tank-top-like__ tunic dress
