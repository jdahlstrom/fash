  # Heavy, windproof, traditional
  outdoors:
    - byrd cloth
    # "Gabardine is a durable twill worsted wool. It is a tightly woven waterproof fabric
    # and is used to make outerwear and various other garments, such as suits, overcoats,
    # trousers, uniforms, and windbreakers."
    - gabardine
    - grenfell clot

  intimate:
    # TODO separate weave and material
