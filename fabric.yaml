fabric:
  denim:
    wash:
      - acid wash
      - bleached
      - dirty wash
      - sandwashed
      - stonewashed
      - vintage wash
      - whisker-washed
    wear:
      - raw-edge
      - lightly faded
      - faded
      - lightly worn
      - frayed
      - distressed
      - worn
      - heavily worn
      - torn
      - ripped

  # TODO add descriptions, uses

  # Materials

  # Aka cambric - shirts, summer dresses, linens, lace
  batiste:
    - cotton
    - linen

  bombazine:
    - cotton
    - silk
    - wool

  cambric:
    - cotton
    - linen

  challis:
    - cotton
    - polyester
    - wool

  chambray:
    - cotton
    - linen

  charmeuse:
    - polyester
    - rayon
    - silk

  # "Chiffon is a lightweight fabric which is associated with elegance and
  # luxury; it drapes well and has a shimmery and sheer appearance.
  # Under a magnifying glass, chiffon resembles a fine net or mesh, which
  # gives it some transparency.
  # "In modern Western fashion, chiffon is most commonly used in evening wear,
  # especially as an overlay, for giving an elegant and floating appearance
  # to the gown. It is also a popular fabric used in blouses, ribbons, scarves
  # and lingerie."
  # Sheer
  chiffon:
      - nylon
      - polyester
      - rayon
      - silk

  lace:
    - cotton
    - linen
    - silk

  # Dresses, blouses, aprons, nightwear, underwear, lingerie, shirting
  # Sheer
  lawn:
    - cotton
    - linen

  # "Marquisette is employed in certain undergarments, and is seen in dresses
  # such as bridal wear and evening wear. It can commonly be seen in sheer
  # draperies and curtains."
  marquisette:
    - nylon

  muslin:
    - cotton

  # "Ninon is mostly used in drapery and curtains. It is also used in blouses,
  # bodices, dresses such as evening wear, and in certain lingerie."
  ninon:
    - nylon
    - polyester
    - rayon
    - silk

  # "Organdy was historically used for bridal dresses, ladies party dresses,
  # and blouses."
  organdy:
    - cotton

  # "Organza is a thin, plain weave, sheer fabric traditionally made from silk.
  # Many modern organzas are woven with synthetic filament fibers such as
  # polyester or nylon."
  # Sheer
  organza:
    - __fash/fabric/synthetic__
    - silk

  # Shirt, dress, nightdress
  poplin:
    - cotton
    - polyester
    - rayon
    - silk
    - wool

  # Sheeny weave
  satin:
    - cotton
    - polyester
    - silk
    - wool

  # "As clothing, it is used in ball gowns, wedding dresses, and corsets,
  # and in interior decoration, for curtains or wallcovering."
  taffeta:
    - nylon
    - polyester
    - rayon
    - silk

  velvet:
    - velour
    - velvet
    - velveteen

  # "Tulle is most commonly used for veils, gowns (particularly wedding gowns),
  # and ballet tutus."
  # Sheer
  tulle:
    - __fash/fabric/synthetic__
    - silk
    #- rayon "very rare"

  muslin-types:
    - mull
    - nainsook
    - seerhand
    - gauze

  # Fiber material


  silk-types:
    - habutai  # light blouses, lingerie
    - shot
    - Tiffany

  synthetic:
    - nylon
    - polyester

  semi-synthetic:
    - lyocell
    - modal
    - rayon

  plant-fiber:
    - cotton
    - linen

  wool:
    - alpaca
    - angora
    - cashmere
    - merino
    - mohair

  loungewear:
    - __fash/fabric/cotton__
    - __fash/fabric/linen__
    - __fash/fabric/semi-synthetic__

  underwear:
    - chiffon

    - cotton/linen/silk lace
    - lycra/spandex
    - nylon
    - __fash/fabric/satin__
    - __fash/fabric/semi-synthetic__

  outdoors: # heavy, windproof
    - byrd cloth
    # "Gabardine is a durable twill worsted wool. It is a tightly woven waterproof fabric
    # and is used to make outerwear and various other garments, such as suits, overcoats,
    # trousers, uniforms, and windbreakers."
    - gabardine
    - grenfell clot


  intimate:
    # TODO separate weave and material
    - __fash/fabric/bombazine__
    - __fash/fabric/challis__
    - __fash/fabric/muslin__
    - __fash/fabric/ninon__
    - __fash/fabric/poplin__
    - __fash/fabric/satin__
    - __fash/fabric/taffeta__
    - __fash/fabric/velvet__

    - __fash/fabric/silk__
    - __fash/fabric/semi-synthetic__

    - bengaline
    - brilliantine
    - jacquard

    - '{nylon|} marquisette' # sheer

    - linen
    - moire
    - toile

    - Ultrasuede

    - Viyella

    - lawn {|cloth}

    - seersucker # warm weather

  ornate:
    - brocade
    - brocatelle
    - jacquard
    - lamé
    - paduasoy


    # ---

    - chambray

    - coutille # corsetry

  misc:
    - terrycloth # frotee

  sheer:
    - cheesecloth
    - chiffon
    - crêpe
    - eolienne
    - gauze
    - gossamer
    - jamdani
    - lawn
    - marquisette
    - voile
    - zephyr

    - __fash/fabric/muslin__
    - muslin {|gauze}
    - __fash/fabric/ninon__ ninon

    - plissé

    - __fash/fabric/tulle__ tulle
    - bobbinet tulle
