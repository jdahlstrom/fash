    - __fash/fabric/challis__ challis
    - __fash/fabric/muslin__ muslin
    - __fash/fabric/ninon__ ninon
    - __fash/fabric/poplin__ poplin
    - __fash/fabric/satin__
    - __fash/fabric/taffeta__ taffeta:
    - __fash/fabric/velvet__

    - __fash/fabric/silk__
    - __fash/fabric/semi-synthetic__

  # Decorated, metal thread, etc
  ornate:
    - brocade
    - brocatelle
    - jacquard
    - lamé
    - paduasoy

  misc:
    - terrycloth # frotee
    - French terry

  sheer:
    - __fash/fabric/tulle__ tulle
    - sheer __fash/fabric/muslin__ muslin
    - __fash/fabric/ninon__ ninon
    - __fash/fabric/organza__ organza

  more-to-be-organized:
    #- bobbin lace # todo separate laces

    # - cheesecloth # for cheesemaking :P

    # "Gauze is a thin, translucent fabric with a loose open weave."
    - gauze

    # "Gossamer fabric is a thin, sheer woven fabric. The structure of the fabric is
    # similar to a gauze. It is usually made of silk, cotton, or wool. The fabric may
    # be coated with rubber to make it waterproof. [..] Gossamer is a very delicate
    # and a see-through fabric. It is used in veils, dresses, long streamers, curtains,
    # and decorations."
    - gossamer

    # Type of muslin
    # "Jamdani (Bengali: জামদানি) is a fine muslin textile (figured with different
    # patterns) produced for centuries in South Rupshi of Narayanganj district in
    # Bangladesh on the bank of Shitalakshya River. "
    - jamdani

    # "Tiffany (silk) is a thin, nearly transparent silk fabric similar to gauze, extant
    # more commonly in the 16th and 17th centuries. [..] Tiffany has been worn as mourning
    # attire, and appeared as trimmings, veils, and dress fabrics, napkins, tablecloths,
    # and scarves.
    - Tiffany silk

    # "Zephyr or zephyr cloth is a sheer, lightweight cotton fabric, usually plain woven,
    # used for dresses, blouses, and shirts. It may be striped or checked. It is named
    # after Zephyr, the Greek god of the west wind"
    - zephyr

    # "Organdy, also spelled Organdie, is a kind of fabric. It is a lightweight, balanced
    # plain weave made of cotton with features of sheerness and crispness. Organdy was
    # historically used for bridal dresses, ladies party dresses, and blouses."
    - '{cotton|} organdy'

    # type of crepe
    - plissé

    # "Bobbinet tulle or genuine tulle is a specific type of tulle which has been made
    # in the United Kingdom since the invention of the bobbinet machine."
    - bobbinet tulle
